# .cicd.yml - PipelineHub CI/CD Configuration
name: demo-python-api-pipeline
language: python
environment: staging

# Pipeline stages to execute
stages:
  - checkout
  - install
  - build
  - test
  - security_scan
  - package
  - deploy
  - notify

# Environment variables
variables:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: /app/src
  FLASK_ENV: production

# Custom scripts per stage
scripts:
  install:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  build:
    - python -m compileall .
    - black --check .
    - flake8 .
  test:
    - pytest tests/ --cov=. --cov-report=xml
    - coverage report --fail-under=70
  security_scan:
    - bandit -r .
    - safety check
  package:
    - docker build -t demo-python-api:$COMMIT_HASH .
    - docker tag demo-python-api:$COMMIT_HASH demo-python-api:latest
  deploy:
    - kubectl apply -f k8s/deployment.yaml
    - kubectl set image deployment/demo-python-api app=demo-python-api:$COMMIT_HASH
